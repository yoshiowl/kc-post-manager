<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KC投稿管理ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
  :root {
    --blue: #2346D4; --blue-light: #E8EEFF; --blue-dark: #1530A0;
    --yellow: #F5C800; --yellow-light: #FFF8D6; --yellow-dark: #B8960A;
    --cyan: #00BCD4; --cyan-light: #E0F7FA; --cyan-dark: #00838F;
    --red: #E24B4A; --red-light: #FCEBEB;
    --gray: #B0B8D8; --gray-light: #F0F2FA;
    --bg: #EEF1FF; --bg2: #FFFFFF;
    --border: rgba(35,70,212,0.15);
    --text: #1a1f4e; --text2: #5560a0; --text3: #8890c8;
    --radius: 16px; --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--blue); padding: 14px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 15px; font-weight: 700; color: white; }
  .sync-status { font-size: 12px; color: rgba(255,255,255,0.6); margin-left: auto; }
  .tab-bar { display: flex; background: var(--blue-dark); padding: 0 16px; overflow-x: auto; }
  .tab { font-size: 13px; font-weight: 500; padding: 12px 16px; cursor: pointer; color: rgba(255,255,255,0.5); border: none; background: none; border-bottom: 3px solid transparent; white-space: nowrap; transition: color 0.15s; }
  .tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }
  .container { max-width: 680px; margin: 0 auto; padding: 16px; }
  .view { display: none; } .view.active { display: block; }

/* ===== STAT GRID - クリック可能 ===== */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.stat {
background: var(–blue);
border-radius: var(–radius-sm);
padding: 12px;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
border: 2px solid transparent;
user-select: none;
-webkit-tap-highlight-color: transparent;
}
.stat:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(35,70,212,0.25); }
.stat:active { transform: scale(0.96); }
.stat.active-filter {
border-color: var(–yellow);
box-shadow: 0 0 0 3px rgba(245,200,0,0.3);
transform: translateY(-2px);
}
.stat.dimmed { opacity: 0.45; }
.stat-val { font-size: 22px; font-weight: 700; color: var(–yellow); }
.stat-lbl { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px; }

/* フィルターバッジ */
.filter-badge {
display: none;
align-items: center;
gap: 8px;
background: var(–yellow-light);
border: 1.5px solid var(–yellow);
border-radius: 20px;
padding: 6px 14px;
font-size: 12px;
font-weight: 700;
color: var(–yellow-dark);
margin-bottom: 12px;
cursor: pointer;
width: fit-content;
transition: background 0.15s;
}
.filter-badge.show { display: flex; }
.filter-badge:hover { background: var(–yellow); color: var(–blue); }
.filter-badge .clear-icon { font-size: 14px; line-height: 1; }

.section-label { font-size: 11px; font-weight: 700; color: var(–text3); letter-spacing: .06em; margin: 16px 0 8px; text-transform: uppercase; }
.card { background: var(–bg2); border: 2px solid var(–blue-light); border-radius: var(–radius); padding: 14px 16px; margin-bottom: 8px; }
.card.status-wip { border-color: var(–cyan); }
.card.status-done { border-color: var(–yellow); opacity: 0.7; }
.row-flex { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.name { font-size: 14px; font-weight: 700; color: var(–text); }
.meta { font-size: 11px; color: var(–text3); margin-top: 2px; }
.memo-text { font-size: 11px; color: var(–text2); margin-top: 3px; }
.user-memo-area { margin-top: 8px; }
.user-memo-area textarea { font-size: 12px; height: 50px; margin-bottom: 4px; }
.user-memo-area .saved { font-size: 11px; color: var(–cyan-dark); margin-top: 2px; }
.tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(–yellow-light); color: var(–yellow-dark); font-weight: 700; }
.badge-late { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(–red-light); color: var(–red); font-weight: 700; }
.days-left { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.days-left.ok { background: var(–cyan-light); color: var(–cyan-dark); }
.days-left.warn { background: var(–yellow-light); color: var(–yellow-dark); }
.days-left.over { background: var(–red-light); color: var(–red); }
.ts { font-size: 11px; color: var(–text3); }
.btn-before { font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 20px; border: 2px solid var(–gray); background: var(–gray-light); color: var(–gray); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.btn-before:hover { background: var(–gray); color: white; }
.btn-wip { font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 20px; border: none; background: var(–cyan); color: white; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.btn-wip:hover { background: var(–cyan-dark); }
.btn-done { font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 20px; border: none; background: var(–yellow); color: var(–blue); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.btn-done:hover { background: var(–yellow-dark); color: white; }
.btn-ghost { font-size: 11px; padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(–border); background: none; color: var(–text2); cursor: pointer; }
.btn-ghost:hover { background: var(–blue-light); }
.btn-danger { font-size: 11px; padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(–red); background: none; color: var(–red); cursor: pointer; }
.toggle-done { font-size: 12px; color: var(–text3); cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 6px; background: none; border: none; margin-bottom: 4px; }
.add-form { background: var(–bg2); border: 2px solid var(–blue-light); border-radius: var(–radius); padding: 16px; margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
input, select, textarea { width: 100%; font-size: 13px; font-family: inherit; padding: 9px 12px; border: 1.5px solid var(–border); border-radius: var(–radius-sm); background: var(–bg); color: var(–text); outline: none; transition: border-color 0.15s; }
input:focus, select:focus, textarea:focus { border-color: var(–blue); }
textarea { height: 60px; resize: none; margin-bottom: 8px; }
.empty { font-size: 13px; color: var(–text3); text-align: center; padding: 32px 0; }
.loading { font-size: 13px; color: var(–text3); text-align: center; padding: 24px 0; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(–blue); color: white; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 20px; transition: transform 0.3s ease; z-index: 100; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.cal-week { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 4px; }
.cal-dow { font-size: 11px; font-weight: 700; color: var(–text3); text-align: center; padding: 4px 0; }
.cal-cell { min-height: 72px; border-radius: var(–radius-sm); border: 2px solid var(–blue-light); background: var(–bg2); padding: 6px; }
.cal-cell.today { border-color: var(–yellow); background: var(–yellow-light); }
.cal-cell.other-month { background: var(–bg); opacity: 0.5; }
.cal-cell.weekend { background: #E8EAF6; }
.cal-cell.weekend.today { background: var(–yellow-light); }
.cal-cell.off-day { background: #F0F2FA; }
.cal-day { font-size: 11px; font-weight: 700; color: var(–text3); margin-bottom: 4px; }
.cal-day.today-num { color: var(–blue); }
.cal-item { font-size: 10px; padding: 2px 5px; border-radius: 8px; margin-bottom: 2px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
.cal-item.done { background: var(–yellow-light); color: var(–yellow-dark); }
.cal-item.wip { background: var(–cyan-light); color: var(–cyan-dark); }
.cal-item.pending { background: var(–blue-light); color: var(–blue); }
.cal-item.late { background: var(–red-light); color: var(–red); }
@media (max-width: 480px) { .stat-grid { grid-template-columns: repeat(2,1fr); } .cal-cell { min-height: 54px; padding: 4px; } .cal-item { font-size: 9px; } .form-grid { grid-template-columns: 1fr; } }
.member-icons { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.member-icon-btn { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; background:none; border:none; }
.member-icon-btn .avatar { width:44px; height:44px; font-size:13px; transition:transform 0.15s; }
.member-icon-btn:hover .avatar { transform:scale(1.1); }
.member-icon-name { font-size:10px; color:var(–text2); font-weight:500; max-width:50px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,20,80,0.5); z-index:200; align-items:center; justify-content:center; padding:16px; }
.modal-overlay.open { display:flex; }
.modal { background:var(–bg2); border-radius:var(–radius); padding:20px; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; }
.modal-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.modal-close { margin-left:auto; background:none; border:none; font-size:20px; cursor:pointer; color:var(–text3); }
.profile-task { background:var(–bg); border-radius:var(–radius-sm); padding:12px; margin-bottom:8px; }
.profile-task-name { font-size:13px; font-weight:700; margin-bottom:4px; }
.profile-task-meta { font-size:11px; color:var(–text3); }
.status-pill { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
.pill-before { background:var(–gray-light); color:var(–gray); }
.pill-wip { background:var(–cyan-light); color:var(–cyan-dark); }
.pill-done { background:var(–yellow-light); color:var(–yellow-dark); }
</style>

</head>

<script>
const SUPABASE_URL = 'https://gnvhnjkndijchfqaeloe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdudmhuamtuZGlqY2hmcWFlbG9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjk1OTgsImV4cCI6MjA5MDY0NTU5OH0.OCCB017F2ibVgJOq0khCtGtlblJUTEa_GkwRqndsGrc';
const TABLE = 'members';
const COLORS = [
  {bg:'#E1F5EE',fg:'#085041'},{bg:'#EEEDFE',fg:'#3C3489'},
  {bg:'#FAECE7',fg:'#712B13'},{bg:'#E6F1FB',fg:'#0C447C'},
  {bg:'#FAEEDA',fg:'#633806'},{bg:'#FBEAF0',fg:'#72243E'},
];
let members = [];
let showDone = false;

// ===== フィルター状態 =====
// null = 全表示, ‘all’=参加者全, ‘before’=未着手, ‘wip’=作成中, ‘done’=完了
let activeFilter = null;

async function api(path, method=‘GET’, body=null) {
const opts = {
method,
headers: {
‘apikey’: SUPABASE_KEY,
‘Authorization’: ’Bearer ’ + SUPABASE_KEY,
‘Content-Type’: ‘application/json’,
‘Prefer’: method === ‘POST’ ? ‘return=representation’ : ‘’,
}
};
if (body) opts.body = JSON.stringify(body);
const res = await fetch(SUPABASE_URL + ‘/rest/v1/’ + path, opts);
if (!res.ok) throw new Error(await res.text());
const text = await res.text();
return text ? JSON.parse(text) : null;
}

async function load() {
try {
members = await api(TABLE + ‘?order=deadline.asc.nullslast&select=*’) || [];
renderAll();
document.getElementById(‘sync-status’).textContent = ‘同期済み’;
} catch(e) {
document.getElementById(‘sync-status’).textContent = ‘接続エラー’;
showToast(‘データ取得に失敗しました’);
}
}

function initials(n) { return n.replace(/さん|くん|ちゃん/g,’’).slice(0,2); }
function avatarStyle(idx) { const c = COLORS[idx % COLORS.length]; return ‘background:’+c.bg+’;color:’+c.fg; }
function getStatus(m) { return m.status || (m.posted ? ‘done’ : ‘before’); }
function isLate(m) {
if (getStatus(m) === ‘done’) return false;
if (!m.deadline) return false;
return new Date(m.deadline) < new Date(new Date().toDateString());
}
function daysLeft(m) {
if (!m.deadline) return null;
const today = new Date(new Date().toDateString());
const dl = new Date(m.deadline);
const diff = Math.floor((dl - today) / 86400000);
return diff;
}
function fmtDate(iso) { if (!iso) return ‘’; return iso.slice(5,10).replace(’-’,’/’); }
function fmtDeadline(m) {
if (!m.deadline) return ‘’;
return ‘締切 ’ + fmtDate(m.deadline);
}
function fmtTs(ts) {
if (!ts) return ‘’;
const d = new Date(ts);
return String(d.getMonth()+1).padStart(2,‘0’)+’/’+String(d.getDate()).padStart(2,‘0’)+’ ‘+String(d.getHours()).padStart(2,‘0’)+’:’+String(d.getMinutes()).padStart(2,‘0’);
}
function daysLeftBadge(m) {
const d = daysLeft(m);
if (d === null) return ‘’;
if (d > 3) return ‘<span class="days-left ok">残り’+d+‘日</span>’;
if (d > 0) return ‘<span class="days-left warn">残り’+d+‘日</span>’;
if (d === 0) return ‘<span class="days-left over" style="background:#4a0000;color:#ff6b6b">締切当日</span>’;
return ‘<span class="days-left over" style="background:#4a0000;color:#ff6b6b">’+Math.abs(d)+‘日超過</span>’;
}

function getUniqueMembers() {
var seen = {};
var result = [];
members.forEach(function(m) {
if (!seen[m.name]) {
seen[m.name] = true;
result.push(m);
}
});
return result;
}

// ===== フィルター操作 =====
function setFilter(type) {
if (activeFilter === type) {
// 同じカードをもう一度タップ → フィルター解除
activeFilter = null;
} else {
activeFilter = type;
}
// フィルターがかかってたら完了も自動表示
if (activeFilter === ‘done’) showDone = true;
renderStats();
renderFilterBadge();
renderMembers();
}

function clearFilter() {
activeFilter = null;
renderStats();
renderFilterBadge();
renderMembers();
}

function renderFilterBadge() {
const badge = document.getElementById(‘filter-badge’);
const badgeText = document.getElementById(‘filter-badge-text’);
if (!activeFilter) {
badge.classList.remove(‘show’);
return;
}
const labels = { all:‘参加者 全員’, before:‘未着手のみ’, wip:‘作成中のみ’, done:‘完了のみ’ };
badgeText.textContent = labels[activeFilter] || ‘’;
badge.classList.add(‘show’);
}

function renderMemberIcons() {
var el = document.getElementById(‘member-icons’);
if (!el) return;
var unique = getUniqueMembers();
el.innerHTML = unique.map(function(m, i) {
var allTasks = members.filter(function(x){ return x.name === m.name; });
var doneCount = allTasks.filter(function(x){ return getStatus(x)===‘done’; }).length;
var hasWip = allTasks.some(function(x){ return getStatus(x)===‘wip’; });
var borderColor = doneCount===allTasks.length?‘var(–yellow)’:hasWip?‘var(–cyan)’:‘var(–blue-light)’;
return ‘<button class="member-icon-btn" onclick="openProfile(' + m.id + ')">’+
‘<div class="avatar" style="'+avatarStyle(i)+';box-shadow:0 0 0 3px '+borderColor+'">’+initials(m.name)+’</div>’+
‘<span class="member-icon-name">’+m.name+’</span>’+
‘</button>’;
}).join(’’);
}

function renderStats() {
const total = members.length;
const before = members.filter(m=>getStatus(m)===‘before’).length;
const wip = members.filter(m=>getStatus(m)===‘wip’).length;
const done = members.filter(m=>getStatus(m)===‘done’).length;

const stats = [
{ type:‘all’,    val: total,  lbl:‘参加者’,  color:‘var(–yellow)’ },
{ type:‘before’, val: before, lbl:‘未着手’,  color:‘var(–gray)’ },
{ type:‘wip’,    val: wip,    lbl:‘作成中’,  color:‘var(–cyan)’ },
{ type:‘done’,   val: done,   lbl:‘完了’,    color:‘var(–yellow)’ },
];

document.getElementById(‘stats’).innerHTML = stats.map(s => {
const isActive = activeFilter === s.type;

}).join(’’);
}

function toggleDone() {
showDone = !showDone;
renderMembers();
}

async function setStatus(id, num) {
var n = parseInt(num);
var smap = [‘before’,‘wip’,‘done’];
var newStatus = smap[n];
var body = {status: newStatus};
if (n === 2) { body.posted = true; body.posted_at = new Date().toISOString(); }
if (n === 0) { body.posted = false; body.posted_at = null; }
try {
await api(TABLE+’?id=eq.’+id, ‘PATCH’, body);
var msgs = [‘作成前に戻しました’,‘作成中にしました！’,‘完成しました！’];
showToast(msgs[n]);
await load();
} catch(e) { showToast(‘エラーが発生しました’); }
}

async function saveUserMemo(id) {
const val = document.getElementById(‘umemo-’+id).value.trim();
try {
await api(TABLE+’?id=eq.’+id, ‘PATCH’, {user_memo: val});
const el = document.getElementById(‘saved-’+id);
if (el) { el.textContent = ‘保存済み’; el.className = ‘saved’; }
showToast(‘メモを保存しました！’);
} catch(e) { showToast(‘保存に失敗しました’); }
}

async function addMember() {
const name = document.getElementById(‘new-name’).value.trim();
const theme = document.getElementById(‘new-theme’).value.trim();
const cat = document.getElementById(‘new-cat’).value;
const deadline = document.getElementById(‘new-deadline’).value || null;
const memo = document.getElementById(‘new-memo’).value.trim();
if (!name) { showToast(‘名前を入力してください’); return; }
try {
await api(TABLE, ‘POST’, {name, theme, cat, deadline, memo, status:‘before’, posted:false, posted_at:null});
[‘new-name’,‘new-theme’,‘new-memo’].forEach(id=>document.getElementById(id).value=’’);
document.getElementById(‘new-deadline’).value=’’;
document.getElementById(‘new-cat’).value=’’;
showToast(name+’ を追加しました！’);
await load();
} catch(e) { showToast(’追加に失敗しました: ’+e.message); }
}

async function removeMember(id) {
if (!confirm(‘本当に削除しますか？’)) return;
try {
await api(TABLE+’?id=eq.’+id, ‘DELETE’);
showToast(‘削除しました’);
await load();
} catch(e) { showToast(‘削除に失敗しました’); }
}

function showTab(t, btn) {
document.querySelectorAll(’.tab’).forEach(b=>b.classList.remove(‘active’));
document.querySelectorAll(’.view’).forEach(v=>v.classList.remove(‘active’));
btn.classList.add(‘active’);
document.getElementById(‘view-’+t).classList.add(‘active’);
if (t === ‘cal’) renderCalendar();
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function changeMonth(dir) {
calMonth += dir;
if (calMonth > 11) { calMonth = 0; calYear++; }
if (calMonth < 0) { calMonth = 11; calYear–; }
renderCalendar();
}

function renderCalendar() {
const today = new Date();
document.getElementById(‘cal-title’).textContent = calYear + ‘年 ’ + (calMonth+1) + ‘月’;
const firstDay = (new Date(calYear, calMonth, 1).getDay() + 6) % 7;
const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
const daysInPrev = new Date(calYear, calMonth, 0).getDate();
const byDate = {};
members.forEach(m => {
if (!m.deadline) return;
const key = (m.deadline_end || m.deadline).slice(0,10);
if (!byDate[key]) byDate[key] = [];
byDate[key].push(m);
});
const dows = [‘月’,‘火’,‘水’,‘木’,‘金’,‘土’,‘日’];
let html = ‘<div class="cal-week">’ + dows.map((d,i) =>
‘<div class="cal-dow" style="'+(i===6||i===0?'color:#B0B8D8':'')+'">’+d+’</div>’
).join(’’) + ‘</div>’;
let cells = [];
for (let i = 0; i < firstDay; i++) cells.push({day: daysInPrev-firstDay+1+i, cur: false});
for (let i = 1; i <= daysInMonth; i++) cells.push({day: i, cur: true});
while (cells.length % 7 !== 0) cells.push({day: cells.length-daysInMonth-firstDay+1, cur: false});
for (let i = 0; i < cells.length; i++) {
if (i % 7 === 0) html += ‘<div class="cal-week">’;
const c = cells[i];
const isToday = c.cur && c.day===today.getDate() && calMonth===today.getMonth() && calYear===today.getFullYear();
const dateKey = calYear+’-’+String(calMonth+1).padStart(2,‘0’)+’-’+String(c.day).padStart(2,‘0’);
const items = c.cur && byDate[dateKey] ? byDate[dateKey] : [];
const dow = i % 7;
html += ‘<div class="cal-cell'+(c.cur?'':' other-month')+(isToday?' today':'')+(c.cur&&(dow===6||dow===0)?' off-day':'')+'">’;
html += ‘<div class="cal-day'+(isToday?' today-num':'')+'" style="'+(dow===6||dow===0?'color:#B0B8D8':'')+'">’+c.day+’</div>’;
items.forEach(m => {
const s = getStatus(m);
const late = isLate(m);
const cls = s===‘done’?‘done’:s===‘wip’?‘wip’:late?‘late’:‘pending’;
html += ‘<div class="cal-item '+cls+'">’+m.name+’</div>’;
});
html += ‘</div>’;
if (i % 7 === 6) html += ‘</div>’;
}
document.getElementById(‘cal-grid’).innerHTML = html;
}

function taskCard(m) {
var status = getStatus(m);
var pillCls = status===‘done’?‘pill-done’:status===‘wip’?‘pill-wip’:‘pill-before’;
var pillTxt = status===‘done’?‘完成’:status===‘wip’?‘作成中’:‘作成前’;
var dl = m.deadline ? ‘締切 ’ + fmtDate(m.deadline) : ‘締切未設定’;
var days = m.deadline ? daysLeftBadge(m) : ‘’;
return ‘<div class="profile-task">’+
‘<div class="profile-task-name">’+(m.theme||‘テーマ未設定’)+(m.cat?’ <span style="font-size:10px;color:var(--text3)">’+m.cat+’</span>’:’’)+’</div>’+
‘<div class="profile-task-meta" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px">’+
‘<span class="status-pill '+pillCls+'">’+pillTxt+’</span>’+
‘<span>’+dl+’</span>’+days+
‘</div>’+
(m.memo?’<div style="font-size:11px;color:var(--text2);margin-top:6px">’+m.memo+’</div>’:’’)+
(m.user_memo?’<div style="font-size:11px;color:var(--blue);margin-top:4px">備考: ‘+m.user_memo+’</div>’:’’)+
(status===‘done’?’<div style="font-size:11px;color:var(--text3);margin-top:4px">完成日時: ‘+fmtTs(m.posted_at)+’</div>’:’’)+
‘</div>’;
}

function openProfileByName(name) {
var allTasks = members.filter(function(x){ return x.name === name; });
if (!allTasks.length) return;
var first = allTasks[0];
var idx = members.indexOf(first);
var av = document.getElementById(‘modal-avatar’);
var c = COLORS[idx % COLORS.length];
av.style.background = c.bg;
av.style.color = c.fg;
av.textContent = initials(name);
document.getElementById(‘modal-name’).textContent = name;
var total = allTasks.length;
var done = allTasks.filter(function(x){ return getStatus(x)===‘done’; }).length;
document.getElementById(‘modal-sub’).textContent = ‘全’+total+‘タスク / 完了’+done+‘件’;
var activeTasks = allTasks.filter(function(x){ return getStatus(x)!==‘done’; });
var doneTasks = allTasks.filter(function(x){ return getStatus(x)===‘done’; });
document.getElementById(‘modal-tasks’).innerHTML = activeTasks.length
? activeTasks.map(taskCard).join(’’)
: ‘<p style="font-size:13px;color:var(--text3)">現在進行中のタスクはありません</p>’;
document.getElementById(‘modal-history’).innerHTML = doneTasks.length
? doneTasks.map(taskCard).join(’’)
: ‘<p style="font-size:13px;color:var(--text3)">まだ完了履歴がありません</p>’;
document.getElementById(‘profile-modal’).classList.add(‘open’);
}

function openProfile(id) {
var m = members.find(function(x){ return x.id === id; });
if (m) openProfileByName(m.name);
}

function closeModal(e) {
if (e.target === document.getElementById(‘profile-modal’)) {
document.getElementById(‘profile-modal’).classList.remove(‘open’);
}
}

let toastTimer;
function showToast(msg) {
const el = document.getElementById(‘toast’);
el.textContent = msg;
el.classList.add(‘show’);
clearTimeout(toastTimer);
toastTimer = setTimeout(()=>el.classList.remove(‘show’), 2500);
}

load();
</script>
